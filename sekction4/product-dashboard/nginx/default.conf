proxy_cache_path /var/cache/nginx/api_stats_cache
                 levels=1:2
                 keys_zone=api_stats:10m
                 max_size=50m
                 inactive=60m
                 use_temp_path=off;

upstream backend_upstream {
    random;
    server api-a:5000;
    server api-b:5000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA static files + client-side routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # /api/items -> /items, /api/stats -> /stats
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend_upstream;
    }

    # Cache only GET /api/stats for 30 seconds
    location = /api/stats {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend_upstream;

        proxy_cache api_stats;
        proxy_cache_valid 200 30s;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        add_header X-Cache-Status $upstream_cache_status always;
    }
}
